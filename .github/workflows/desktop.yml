name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform_label }} ${{ matrix.arch }} ${{ matrix.bundle }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_label: windows
            arch: x64
            bundle: nsis
            tauri_args: --ci --bundles nsis
            artifact_name: Prismifold-windows-x64-nsis
            artifact_path: src-tauri/target/release/bundle/nsis/*setup.exe
            release_asset_name: Prismifold-windows-x64-setup.exe
            apple_signing_identity: ''
          - os: macos-latest
            platform_label: macos
            arch: arm64
            bundle: dmg
            tauri_args: --ci --target aarch64-apple-darwin --bundles dmg
            artifact_name: Prismifold-macos-arm64-dmg
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            release_asset_name: Prismifold-macos-arm64.dmg
            apple_signing_identity: '-'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify release version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(cargo metadata --locked --no-deps --manifest-path src-tauri/Cargo.toml --format-version 1 | node -e "let input = ''; process.stdin.on('data', (chunk) => { input += chunk; }); process.stdin.on('end', () => { const metadata = JSON.parse(input); const pkg = metadata.packages.find((candidate) => candidate.name === 'prismifold-desktop'); if (!pkg) { process.exit(1); } console.log(pkg.version); });")"

          if [ "$version" != "$package_version" ] || [ "$version" != "$tauri_version" ] || [ "$version" != "$cargo_version" ]; then
            {
              echo "Release tag version must match package metadata."
              echo "tag:        $version"
              echo "package:    $package_version"
              echo "tauri:      $tauri_version"
              echo "cargo:      $cargo_version"
            } >&2
            exit 1
          fi

      - name: Add macOS Apple Silicon Rust target
        if: matrix.platform_label == 'macos'
        run: rustup target add aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: desktop-cargo-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            desktop-cargo-${{ runner.os }}-${{ matrix.arch }}-
            desktop-cargo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Check desktop shell
        run: npm run desktop:check

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
        with:
          args: ${{ matrix.tauri_args }}
          includeUpdaterJson: false

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=( ${{ matrix.artifact_path }} )

          if [ "${#matches[@]}" -ne 1 ]; then
            printf 'Expected exactly one bundle output matching %s, found %s.\n' '${{ matrix.artifact_path }}' "${#matches[@]}" >&2
            printf '%s\n' "${matches[@]}" >&2
            exit 1
          fi

          mkdir -p release-assets
          asset_path="release-assets/${{ matrix.release_asset_name }}"
          asset_name="${{ matrix.release_asset_name }}"
          cp "${matches[0]}" "$asset_path"

          node --input-type=module - "$asset_path" "$asset_name" <<'JS'
          import { createHash } from 'node:crypto';
          import { readFileSync, writeFileSync } from 'node:fs';

          const [, , assetPath, assetName] = process.argv;
          const digest = createHash('sha256').update(readFileSync(assetPath)).digest('hex');
          writeFileSync(`${assetPath}.sha256`, `${digest}  ${assetName}\n`);
          JS

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

      - name: Remove bundle outputs before cache save
        if: always()
        shell: bash
        run: |
          rm -rf src-tauri/target/release/bundle
          rm -rf src-tauri/target/*/release/bundle

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found under release-assets/." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --latest
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes --latest
          fi
